<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://kit.fontawesome.com/7ff30387aa.js"
      crossorigin="anonymous"
    ></script>
    <title>Green Earth</title>
  </head>
  <body>
    <!-- navbar -->
    <section>
      <div class="navbar bg-base-100 shadow-sm bg-[#15803D]">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm text-white dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a>About</a></li>
              <li><a>Gallery</a></li>
              <li><a>Plant a Tree</a></li>
            </ul>
          </div>
          <a class="btn btn-ghost text-xl text-white">Green Earth</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1 text-white">
            <li><a>About</a></li>
            <li><a>Gallery</a></li>
            <li><a>Plant a Tree</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn bg-[#FACC15] text-[#15803D] mr-5 rounded-[999px]"
            >Plant a Tree</a
          >
        </div>
      </div>
    </section>
    <!-- banner -->
    <section>
      <div
        class="banner h-[40vh] bg-[#CFF0DC] flex justify-between items-center"
      >
        <div>
          <img
            class="object-cover h-[40vh]"
            src="images/hero-leaf1.png"
            alt=""
          />
        </div>
        <div class="flex flex-col gap-5 items-center">
          <h1 class="text-3xl">Plant a Tree, Grow a Future</h1>
          <p class="text-[#1F2937] text-[10px]">
            Join our mission to plant 1 million trees and make the Earth greener
            for future generations.
          </p>
          <button class="btn bg-[#FACC15] text-[#15803D] rounded-[999px] px-5">
            Get Involved
          </button>
        </div>
        <div>
          <img
            class="object-cover h-[40vh]"
            src="images/hero-leaf2.png"
            alt=""
          />
        </div>
      </div>
    </section>
    <!-- main -->
    <section class="bg-[#F0FDF4]">
      <h2 class="text-center text-4xl mb-5">Choose Your Trees</h2>
      <div class="flex gap-10">
        <!-- Categories -->
        <div class="ml-5">
          <ul id="category-container" class="menu rounded-box w-50">
            <li class="font-semibold">Categories</li>
          </ul>
        </div>
        <!-- cards -->
        <div
          id="card-container"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-15 gap-y-5"
        ></div>

        <div class="w-1/6 bg-white mr-3">
          <h3 class="text-2xl text-center">Your Cart</h3>
          <div
            class="bg-gray-300 flex justify-between items-center rounded-[5px] p-4 m-4 "
          >
            <div>
              <p class="text-[12px]">Mango Tree</p>
              <p class="text-[10px] opacity-80">৳500 x 1</p>
            </div>
            <p class="text-[12px]"><i class="fa-solid fa-xmark"></i></p>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
