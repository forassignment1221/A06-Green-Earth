<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <!-- navbar -->
    <section>
      <div class="navbar bg-base-100 shadow-sm bg-[#15803D]">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm text-white dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a>About</a></li>
              <li><a>Gallery</a></li>
              <li><a>Plant a Tree</a></li>
            </ul>
          </div>
          <a class="btn btn-ghost text-xl text-white">Green Earth</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1 text-white">
            <li><a>About</a></li>
            <li><a>Gallery</a></li>
            <li><a>Plant a Tree</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn bg-[#FACC15] text-[#15803D] mr-5 rounded-[999px]">Plant a Tree</a>
        </div>
      </div>
    </section>
    <!-- banner -->
    <section>
        <div class="banner h-[40vh] bg-[#CFF0DC] flex justify-between items-center">
            <div>
                <img class="object-cover h-[40vh]" src="images/hero-leaf1.png" alt="">
            </div>
            <div class=" flex flex-col gap-5 items-center">
                <h1 class="text-3xl ">
                    Plant a Tree
                </h1>
                <p class="text-[#1F2937] text-[10px]">
                    Join our mission to plant 1 million trees
                </p>
                <button class="btn bg-[#FACC15] text-[#15803D] rounded-[999px] px-5">Get Involved</button>

            </div>
            <div>
                <img class="object-cover h-[40vh] " src="images/hero-leaf2.png" alt="">
            </div>

        </div>

    </section>
    <!-- main -->
     
  </body>
</html>
